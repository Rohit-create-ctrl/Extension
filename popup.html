<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focus Analytics</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        width: 360px;
        min-height: 420px;
      }

      .popup-shell {
        padding: 16px;
      }

      .popup-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin: 14px 0;
      }

      .popup-stat {
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .popup-stat .label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .popup-stat .value {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
      }

      .stack {
        display: grid;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <main class="popup-shell">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h2>Focus Analytics</h2>
          <p id="popupDomain">Watching active browsing only</p>
        </div>
      </div>

      <section class="popup-stats">
        <article class="popup-stat"><div class="label">Today</div><div class="value" id="popupToday">0m</div></article>
        <article class="popup-stat"><div class="label">Score</div><div class="value" id="popupScore">0</div></article>
        <article class="popup-stat"><div class="label">Switches</div><div class="value" id="popupSwitches">0</div></article>
        <article class="popup-stat"><div class="label">Focus</div><div class="value" id="popupFocus">0</div></article>
      </section>

      <div class="stack">
        <button class="button" id="openDashboardButton" type="button">Open dashboard</button>
        <button class="button secondary" id="openSettingsButton" type="button">Open settings</button>
        <button class="button ghost" id="exportJsonButton" type="button">Export JSON</button>
      </div>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
